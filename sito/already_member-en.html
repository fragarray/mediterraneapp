<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I already have a card! – Mediterranea</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --seed: #2E7D32;
      --seed-light: rgba(46,125,50,0.05);
      --seed-10: rgba(46,125,50,0.10);
      --scaffold-bg: #F7F8F6;
      --text-primary: #152417;
      --text-secondary: #555;
      --border-color: #d0d0d0;
      --white: #fff;
      --radius: 14px;
      --radius-lg: 18px;
      --error: #c62828;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(to bottom, var(--seed-light), var(--scaffold-bg));
      background-color: var(--scaffold-bg);
      color: var(--text-primary);
      min-height: 100vh;
      opacity: 0;
      transition: opacity .25s ease;
    }
    body.ready { opacity: 1; }

    /* ---- AppBar ---- */
    .appbar {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      background: transparent;
    }
    .appbar-title {
      font-size: 20px;
      font-weight: 600;
      flex: 1;
    }
    .appbar-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--seed);
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      text-decoration: none;
      transition: background .15s;
    }
    .appbar-link:hover { background: var(--seed-10); }
    .appbar-link .material-icons-outlined { font-size: 20px; }

    /* ---- Layout ---- */
    .page-body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 16px;
      min-height: calc(100vh - 56px);
    }

    /* ---- Card ---- */
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid #e8e8e8;
      padding: 24px;
    }

    .card-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .card-desc {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    /* ---- Form ---- */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 16px;
    }
    .form-group label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .input-with-icon {
      position: relative;
    }
    .input-with-icon .material-icons-outlined {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: #999;
      pointer-events: none;
    }
    .input-with-icon input {
      padding-left: 42px !important;
    }
    .form-group input {
      padding: 14px 16px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      font-size: 16px;
      font-family: inherit;
      background: var(--white);
      color: var(--text-primary);
      outline: none;
      transition: border-color .15s;
      width: 100%;
    }
    .form-group input:focus {
      border-color: var(--seed);
      box-shadow: 0 0 0 2px var(--seed-10);
    }
    .form-group .error-msg {
      font-size: 12px;
      color: var(--error);
      margin-top: 2px;
      display: none;
    }
    .form-group.has-error input {
      border-color: var(--error);
    }
    .form-group.has-error .error-msg {
      display: block;
    }

    /* ---- Button ---- */
    .btn-filled {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      background: var(--seed);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: filter .15s;
    }
    .btn-filled:hover { filter: brightness(1.08); }
    .btn-filled:disabled {
      opacity: .55;
      cursor: not-allowed;
      filter: none;
    }

    /* ---- Snackbar ---- */
    .snackbar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      min-width: 320px;
      max-width: 90vw;
      padding: 14px 24px;
      border-radius: 12px;
      color: var(--white);
      font-size: 15px;
      font-weight: 500;
      z-index: 2000;
      text-align: center;
      transition: transform .3s ease;
      pointer-events: none;
    }
    .snackbar.visible {
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }
    .snackbar.success { background: var(--seed); }
    .snackbar.error   { background: #c62828; }

    /* ---- Language switcher ---- */
    .lang-switcher {
      display: flex;
      gap: 4px;
      align-items: center;
      margin-right: 8px;
    }
    .lang-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border: 1.5px solid var(--border-color);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      color: var(--text-secondary);
      background: var(--white);
      transition: all .15s;
      line-height: 1;
    }
    .lang-btn:hover {
      border-color: var(--seed);
      color: var(--seed);
    }
    .lang-btn.active {
      background: var(--seed);
      border-color: var(--seed);
      color: var(--white);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- AppBar -->
  <header class="appbar">
    <span class="appbar-title">I already have a card!</span>
    <div class="lang-switcher">
      <a href="already_member.html" class="lang-btn">🇮🇹 IT</a>
      <span class="lang-btn active">🇬🇧 EN</span>
    </div>
    <a href="index.html" class="appbar-link">
      <span class="material-icons-outlined">home</span> Home
    </a>
  </header>

  <!-- Body -->
  <main class="page-body">
    <div class="card">
      <h1 class="card-title">Legacy Membership Digitisation</h1>
      <p class="card-desc">
        Enter the number of the paper membership card you already hold.
        If valid, you'll be able to fill in your details to digitise it while keeping the same number.
      </p>

      <form id="memberForm" novalidate>
        <div class="form-group">
          <label for="membershipNumber">Membership number</label>
          <div class="input-with-icon">
            <span class="material-icons-outlined">confirmation_number</span>
            <input type="text" id="membershipNumber" name="membershipNumber"
                   placeholder="e.g. 845" inputmode="numeric" required>
          </div>
          <span class="error-msg" id="memberError">Enter a valid number greater than zero</span>
        </div>

        <button type="submit" class="btn-filled" id="submitBtn">
          <span class="material-icons-outlined">arrow_forward</span>
          Continue with this number
        </button>
      </form>
    </div>
  </main>

  <!-- Snackbar -->
  <div class="snackbar" id="snackbar"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script>
    function showSnackbar(message, isError) {
      const el = document.getElementById('snackbar');
      el.textContent = message;
      el.className = 'snackbar visible ' + (isError ? 'error' : 'success');
      setTimeout(() => el.classList.remove('visible'), 4000);
    }

    // Load theme colour
    (async function() {
      const hex = await getAppSetting(SETTING_THEME_COLOR);
      applySeedColor(hex);
      document.body.classList.add('ready');
    })();

    document.getElementById('memberForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const input = document.getElementById('membershipNumber');
      const group = input.closest('.form-group');
      const raw = input.value.trim();
      const num = parseInt(raw, 10);

      if (!raw || isNaN(num) || num <= 0) {
        group.classList.add('has-error');
        return;
      }
      group.classList.remove('has-error');

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="material-icons-outlined" style="animation:spin 1s linear infinite">sync</span> Checking...';

      try {
        const result = await canRequestLegacyMembershipNumber(num);

        if (!result.ok) {
          showSnackbar(result.reason, true);
          return;
        }

        window.location.href = 'registration-en.html?tessera=' + encodeURIComponent(num);
      } catch (err) {
        showSnackbar(err.message || 'An error occurred during verification.', true);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span class="material-icons-outlined">arrow_forward</span> Continue with this number';
      }
    });
  </script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</body>
</html>
