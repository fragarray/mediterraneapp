<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesseramento Mediterranea</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --seed: #2E7D32;
      --seed-light: rgba(46,125,50,0.05);
      --seed-10: rgba(46,125,50,0.10);
      --scaffold-bg: #F7F8F6;
      --text-primary: #152417;
      --text-secondary: #555;
      --border-color: #d0d0d0;
      --white: #fff;
      --radius: 14px;
      --radius-lg: 18px;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(
        to bottom,
        var(--seed-light),
        var(--scaffold-bg)
      );
      background-color: var(--scaffold-bg);
      color: var(--text-primary);
      min-height: 100vh;
      opacity: 0;
      transition: opacity .25s ease;
    }
    body.ready { opacity: 1; }

    /* ---- AppBar ---- */
    .appbar {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      background: transparent;
    }
    .appbar-title {
      font-size: 20px;
      font-weight: 600;
      flex: 1;
    }
    .appbar-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text-primary);
      border-radius: 50%;
      transition: background .15s;
    }
    .appbar-action:hover {
      background: var(--seed-10);
    }

    /* ---- Layout ---- */
    .page-center {
      display: flex;
      justify-content: center;
      padding: 24px 16px;
    }
    @media (min-width: 900px) {
      .page-center { padding: 24px 24px; }
    }
    .page-content {
      width: 100%;
      max-width: 880px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ---- Logo ---- */
    .logo {
      height: 96px;
      border-radius: var(--radius-lg);
      object-fit: contain;
    }
    @media (min-width: 900px) {
      .logo { height: 132px; }
    }

    /* ---- Carousel placeholder ---- */
    .carousel-placeholder {
      width: 100%;
      max-width: 820px;
      padding: 40px 20px;
      background: #F4F6F3;
      border-radius: 16px;
      border: 1px solid var(--border-color);
      text-align: center;
      color: var(--text-secondary);
      margin-top: 18px;
    }

    /* ---- Carousel (immagini caricate da JS) ---- */
    .carousel-wrapper {
      width: 100%;
      max-width: 820px;
      margin-top: 18px;
      border-radius: var(--radius-lg);
      position: relative;
      display: none;
    }
    .carousel-viewport {
      overflow: hidden;
      width: 100%;
    }
    .carousel-track {
      display: flex;
      /* cubic-bezier matches Flutter Curves.fastOutSlowIn */
      transition: transform 700ms cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }
    .carousel-slide {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      /* same curve + 700ms = autoPlayAnimationDuration */
      transition: transform 700ms cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: center center;
    }
    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      cursor: pointer;
      display: block;
    }

    /* ---- Instagram ---- */
    .instagram-btn {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border: none;
      background: none;
      cursor: pointer;
      border-radius: 50%;
      transition: background .15s;
    }
    .instagram-btn:hover { background: var(--seed-10); }
    .instagram-btn svg { width: 32px; height: 32px; }

    /* ---- Buttons ---- */
    .btn-filled {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 22px 24px;
      background: var(--seed);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: filter .15s;
    }
    .btn-filled:hover { filter: brightness(1.08); }

    .btn-outlined {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 18px 24px;
      background: transparent;
      color: var(--seed);
      border: 2px solid var(--seed);
      border-radius: var(--radius);
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s;
    }
    .btn-outlined:hover { background: var(--seed-10); }

    .gap-18 { margin-top: 18px; }

    .admin-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 32px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color .15s;
    }
    .admin-link:hover { color: var(--seed); }

    /* ---- Lightbox ---- */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <!-- AppBar -->
  <header class="appbar">
    <span class="appbar-title">Mediterranea </span>
    <a href="admin.html" class="appbar-action" title="Area admin">
      <span class="material-icons-outlined">admin_panel_settings</span>
    </a>
  </header>

  <!-- Body -->
  <main class="page-center">
    <div class="page-content">

      <!-- Logo -->
      <img src="logopiccolo.png" alt="Logo Mediterranea" class="logo">

      <!-- Carousel placeholder (mostrato se non ci sono immagini) -->
      <div class="carousel-placeholder" id="carouselPlaceholder">
        Il carosello verrà mostrato qui.
      </div>

      <!-- Carousel reale (nascosto di default) -->
      <div class="carousel-wrapper" id="carouselWrapper">
        <div class="carousel-viewport">
          <div class="carousel-track" id="carouselTrack"></div>
        </div>
      </div>

      <!-- Instagram -->
      <button class="instagram-btn" id="instagramBtn" title="Apri profilo Instagram" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="Instagram">
          <path fill="#E4405F" d="M7.8 2h8.4C19.4 2 22 4.6 22 7.8v8.4c0 3.2-2.6 5.8-5.8 5.8H7.8C4.6 22 2 19.4 2 16.2V7.8C2 4.6 4.6 2 7.8 2zm0 1.9A3.9 3.9 0 0 0 3.9 7.8v8.4a3.9 3.9 0 0 0 3.9 3.9h8.4a3.9 3.9 0 0 0 3.9-3.9V7.8a3.9 3.9 0 0 0-3.9-3.9H7.8zm8.9 1.5a1.3 1.3 0 1 1 0 2.6 1.3 1.3 0 0 1 0-2.6zM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 1.9a3.1 3.1 0 1 0 0 6.2 3.1 3.1 0 0 0 0-6.2z"/>
        </svg>
      </button>

      <!-- CTA buttons -->
      <a href="registration.html" class="btn-filled gap-18">
        <span class="material-icons-outlined">how_to_reg</span>
        Nuova registrazione
      </a>

      <a href="already_member.html" class="btn-outlined gap-18">
        <span class="material-icons-outlined">badge</span>
        Ho già la tessera!
      </a>

      <a href="admin.html" class="admin-link">
        <span class="material-icons-outlined" style="font-size:15px;">admin_panel_settings</span>
        Area admin
      </a>

    </div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <img id="lightboxImg" src="" alt="Immagine ingrandita">
  </div>

  <script src="supabase-config.js"></script>
  <script>
    /* ======== Lightbox ======== */
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');

    lightbox.addEventListener('click', () => lightbox.classList.remove('active'));

    function openLightbox(src) {
      lightboxImg.src = src;
      lightbox.classList.add('active');
    }

    /* ======== Carousel ======== */
    const carouselWrapper = document.getElementById('carouselWrapper');
    const carouselTrack   = document.getElementById('carouselTrack');
    const placeholder     = document.getElementById('carouselPlaceholder');

    let realCount = 0;        // numero slide reali (senza cloni)
    let internalIndex = 0;    // posizione nel track completo (cloni inclusi)
    let autoplayTimer = null;
    let carouselFraction = 1;
    let carouselEnlarge = true;
    const ENLARGE_FACTOR = 0.34;

    /* CenterPageEnlargeStrategy.zoom */
    function updateSlideScales() {
      const slides = carouselTrack.querySelectorAll('.carousel-slide');
      slides.forEach((slide, i) => {
        if (carouselEnlarge && realCount > 1) {
          const isCenter = i === internalIndex;
          slide.style.transform = isCenter ? 'scale(1)' : `scale(${1 - ENLARGE_FACTOR})`;
          slide.style.zIndex    = isCenter ? '2' : '1';
        } else {
          slide.style.transform = 'scale(1)';
          slide.style.zIndex    = '1';
        }
      });
    }

    /* Sposta il track alla slide indicata.
       animate=false => salto istantaneo (usato dopo transitionend per ricentrare). */
    function goToSlide(idx, animate) {
      if (animate === undefined) animate = true;
      internalIndex = idx;

      if (!animate) {
        carouselTrack.style.transition = 'none';
      }

      const slideW   = carouselFraction * 100;
      const padOffset = (100 - slideW) / 2;
      const tx = internalIndex * slideW - padOffset;
      carouselTrack.style.transform = 'translateX(' + (-tx) + '%)';
      updateSlideScales();

      if (!animate) {
        // forza reflow, poi ripristina la transizione CSS
        void carouselTrack.offsetHeight;
        carouselTrack.style.transition = '';
      }
    }

    /* Dopo la transizione, se siamo su un clone saltiamo
       silenziosamente alla slide reale equivalente. */
    carouselTrack.addEventListener('transitionend', function() {
      if (internalIndex < realCount) {
        goToSlide(internalIndex + realCount, false);
      } else if (internalIndex >= 2 * realCount) {
        goToSlide(internalIndex - realCount, false);
      }
    });

    function startAutoplay(seconds) {
      stopAutoplay();
      autoplayTimer = setInterval(function() {
        goToSlide(internalIndex + 1);
      }, seconds * 1000);
    }
    function stopAutoplay() {
      if (autoplayTimer) { clearInterval(autoplayTimer); autoplayTimer = null; }
    }

    function renderCarousel(settings) {
      const urls = settings.image_urls || [];
      if (!urls.length) return;

      const height      = Math.min(Math.max(Number(settings.widget_height)   || 230, 140), 520);
      const visible     = Math.min(Math.max(Number(settings.visible_items)   || 2,     1),   4);
      const autoplaySec = Math.min(Math.max(Number(settings.autoplay_seconds)|| 4,     1),  12);

      carouselFraction = urls.length > 1
        ? Math.min(Math.max(1 / visible, 0.28), 1)
        : 1;
      carouselEnlarge = urls.length > 1;
      realCount = urls.length;

      const viewport = carouselWrapper.querySelector('.carousel-viewport');
      viewport.style.height = height + 'px';

      /* Track = [cloni] [reali] [cloni]  —  3 copie per loop infinito.
         La sezione "reale" va da indice realCount a 2*realCount-1.       */
      const allUrls = urls.length > 1 ? [...urls, ...urls, ...urls] : urls;

      carouselTrack.innerHTML = '';
      allUrls.forEach(function(url) {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        slide.style.flex   = '0 0 ' + (carouselFraction * 100) + '%';
        slide.style.width  = (carouselFraction * 100) + '%';
        slide.style.height = height + 'px';

        const img = document.createElement('img');
        img.src = url;
        img.alt = 'Immagine carosello';
        img.addEventListener('click', function() { openLightbox(url); });
        img.onerror = function() { this.alt = 'Immagine non disponibile'; };

        slide.appendChild(img);
        carouselTrack.appendChild(slide);
      });

      placeholder.style.display = 'none';
      carouselWrapper.style.display = 'block';

      /* Partenza dalla foto centrale (sezione reale).
         Es. 5 foto → indice reale 2 → indice interno realCount + 2. */
      var startReal = Math.floor(realCount / 2);
      var startIdx  = urls.length > 1 ? realCount + startReal : 0;
      goToSlide(startIdx, false);

      if (urls.length > 1) startAutoplay(autoplaySec);
    }

    /* ======== Instagram ======== */
    function setupInstagram(url) {
      if (!url || !url.trim()) return;
      const btn = document.getElementById('instagramBtn');
      btn.disabled = false;
      btn.addEventListener('click', () => window.open(url.trim(), '_blank'));
    }

    /* ======== Caricamento da Supabase ======== */
    (async function init() {
      // 1. Colore tema (prima di mostrare la pagina)
      const colorHex = await getAppSetting(SETTING_THEME_COLOR);
      applySeedColor(colorHex);
      document.body.classList.add('ready');

      // 2. Instagram
      const instagramUrl = await getAppSetting(SETTING_INSTAGRAM_URL);
      setupInstagram(instagramUrl);

      // 3. Carosello
      const carouselRaw = await getAppSetting(SETTING_CAROUSEL_CONFIG);
      if (carouselRaw) {
        try {
          const settings = JSON.parse(carouselRaw);
          renderCarousel(settings);
        } catch { /* json non valido, resta il placeholder */ }
      }
    })();
  </script>
</body>
</html>
