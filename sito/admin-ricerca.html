<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ricerca soci – Mediterranea</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --seed: #2E7D32;
      --seed-light: rgba(46,125,50,0.05);
      --seed-10: rgba(46,125,50,0.10);
      --scaffold-bg: #F7F8F6;
      --text-primary: #152417;
      --text-secondary: #555;
      --border-color: #d0d0d0;
      --white: #fff;
      --radius: 14px;
      --radius-lg: 18px;
      --error: #c62828;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--scaffold-bg);
      color: var(--text-primary);
      min-height: 100vh;
      opacity: 0;
      transition: opacity .25s ease;
    }
    body.ready { opacity: 1; }

    /* ---- AppBar ---- */
    .appbar {
      display: flex; align-items: center;
      padding: 12px 20px;
      background: var(--white);
      border-bottom: 1px solid var(--border-color);
      gap: 8px;
      position: sticky; top: 0; z-index: 100;
    }
    .appbar-title { font-size: 18px; font-weight: 700; flex: 1; }
    .appbar-user  { font-size: 13px; color: var(--text-secondary); }
    .appbar-action {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 7px 14px; border: none; background: none; cursor: pointer;
      color: var(--text-secondary); font-size: 13px; font-weight: 600;
      border-radius: 8px; text-decoration: none; gap: 5px;
      transition: background .15s;
    }
    .appbar-action:hover { background: var(--seed-10); color: var(--seed); }
    .appbar-action .material-icons-outlined { font-size: 18px; }

    /* ---- Auth gate ---- */
    #authGate {
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 57px); padding: 24px;
    }
    .auth-gate-box {
      text-align: center; max-width: 400px;
      background: var(--white); border: 1px solid #e8e8e8;
      border-radius: var(--radius-lg); padding: 32px;
    }
    .auth-gate-box .material-icons-outlined { font-size: 48px; color: var(--seed); margin-bottom: 12px; }
    .auth-gate-box h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .auth-gate-box p  { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }

    /* ---- Page body ---- */
    #pageBody {
      display: none;
      padding: 24px 20px;
      max-width: 1280px;
      margin: 0 auto;
    }

    /* ---- Form groups (modal, etc.) ---- */
    .form-group {
      display: flex; flex-direction: column; gap: 3px;
    }
    .form-group label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
    .form-group input, .form-group select {
      padding: 9px 12px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-size: 13px; font-family: inherit;
      background: var(--white); color: var(--text-primary);
      outline: none; transition: border-color .15s; width: 100%;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: var(--seed);
      box-shadow: 0 0 0 2px var(--seed-10);
    }

    /* ---- Filter panel ---- */
    .filter-card {
      background: var(--white);
      border: 1px solid #e8e8e8;
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      margin-bottom: 16px;
    }
    .search-main {
      display: flex; align-items: center; gap: 0;
    }
    .search-main input {
      flex: 1; padding: 13px 16px;
      border: 1px solid var(--border-color);
      border-radius: 14px 0 0 14px;
      font-size: 15px; font-family: inherit;
      background: var(--white); color: var(--text-primary);
      outline: none; transition: border-color .15s;
    }
    .search-main input:focus {
      border-color: var(--seed);
      box-shadow: 0 0 0 2px var(--seed-10);
    }
    .search-main input::placeholder { color: #999; }
    .tune-btn {
      display: flex; align-items: center; justify-content: center;
      width: 48px; height: 48px;
      border: 1px solid var(--border-color); border-left: none;
      border-radius: 0 14px 14px 0;
      background: var(--white); cursor: pointer;
      color: var(--text-secondary); transition: background .12s, color .12s;
    }
    .tune-btn:hover, .tune-btn.active { background: var(--seed-10); color: var(--seed); }
    .tune-btn .material-icons-outlined { font-size: 22px; }
    .advanced-panel {
      display: none;
      margin-top: 12px; padding: 14px;
      background: #F8FAF7;
      border-radius: 16px;
      border: 1px solid #e8e8e8;
    }
    .advanced-panel.show { display: block; }
    .advanced-panel .filter-row {
      display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px;
    }
    .advanced-panel .filter-row:last-child { margin-bottom: 0; }
    .advanced-panel .filter-field {
      display: flex; flex-direction: column; gap: 3px;
      min-width: 150px; flex: 1; max-width: 220px;
    }
    .advanced-panel .filter-field label {
      font-size: 11px; font-weight: 600; color: var(--text-secondary);
    }
    .advanced-panel .filter-field input,
    .advanced-panel .filter-field select {
      padding: 8px 10px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-size: 13px; font-family: inherit;
      background: var(--white); color: var(--text-primary);
      outline: none; transition: border-color .15s; width: 100%;
    }
    .advanced-panel .filter-field input:focus,
    .advanced-panel .filter-field select:focus {
      border-color: var(--seed);
      box-shadow: 0 0 0 2px var(--seed-10);
    }
    .filter-actions {
      display: flex; flex-wrap: wrap; align-items: center;
      gap: 10px; margin-top: 14px;
    }
    .result-count {
      font-size: 13px; color: var(--text-secondary);
      margin-left: auto;
    }

    /* ---- Buttons ---- */
    .btn-filled {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 18px;
      background: var(--seed); color: var(--white); border: none;
      border-radius: var(--radius); font-size: 13px; font-weight: 700;
      cursor: pointer; transition: filter .15s;
    }
    .btn-filled:hover { filter: brightness(1.08); }
    .btn-filled:disabled { opacity: .5; cursor: not-allowed; filter: none; }
    .btn-filled .material-icons-outlined { font-size: 17px; }

    .btn-outlined {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 9px 16px;
      background: transparent; color: var(--seed); border: 1.5px solid var(--seed);
      border-radius: var(--radius); font-size: 13px; font-weight: 700;
      cursor: pointer; transition: background .15s;
    }
    .btn-outlined:hover { background: var(--seed-10); }
    .btn-outlined .material-icons-outlined { font-size: 17px; }

    .btn-ghost {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border: none; background: none;
      color: var(--text-secondary); font-size: 13px; font-weight: 600;
      cursor: pointer; border-radius: 8px; transition: background .12s, color .12s;
    }
    .btn-ghost:hover { background: var(--seed-10); color: var(--seed); }
    .btn-ghost .material-icons-outlined { font-size: 17px; }

    /* ---- Table ---- */
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      background: var(--white);
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      background: #F4F6F3; font-weight: 700; text-align: left;
      padding: 10px 12px; white-space: nowrap;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-secondary); cursor: pointer; user-select: none;
    }
    th:hover { background: #EAF0EA; }
    th .sort-icon { font-size: 13px; vertical-align: middle; color: var(--seed); }
    td {
      padding: 10px 12px; border-bottom: 1px solid #f0f0f0;
      vertical-align: middle; max-width: 200px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--seed-light); }

    /* ---- Status badge ---- */
    .badge {
      display: inline-block; padding: 2px 9px;
      border-radius: 999px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .03em;
    }
    .badge-pending  { background: #FFF8E1; color: #F57F17; }
    .badge-approved { background: #E8F5E9; color: #2E7D32; }
    .badge-deleted  { background: #FAFAFA; color: #9E9E9E; }
    .badge-rejected { background: #FFEBEE; color: #C62828; }

    /* ---- Action buttons ---- */
    .action-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border: none; background: none; cursor: pointer;
      border-radius: 8px; color: var(--text-secondary);
      transition: background .12s, color .12s;
    }
    .action-btn .material-icons-outlined { font-size: 18px; }
    .action-btn:hover { background: var(--seed-10); color: var(--seed); }
    .action-btn.danger:hover { background: #FFEBEE; color: var(--error); }
    .action-btn:disabled { opacity: .4; pointer-events: none; }

    /* ---- Firma link ---- */
    .firma-link {
      display: inline-flex; align-items: center;
      color: var(--seed); text-decoration: none; font-size: 12px; gap: 3px;
    }
    .firma-link:hover { text-decoration: underline; }
    .firma-link .material-icons-outlined { font-size: 15px; }

    /* ---- Snackbar ---- */
    .snackbar {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      min-width: 320px; max-width: 90vw;
      padding: 14px 24px; border-radius: 12px;
      color: var(--white); font-size: 14px; font-weight: 500;
      z-index: 3000; text-align: center;
      transition: transform .3s ease; pointer-events: none;
    }
    .snackbar.visible { transform: translateX(-50%) translateY(0); pointer-events: auto; }
    .snackbar.success { background: var(--seed); }
    .snackbar.error   { background: var(--error); }

    /* ---- Modal ---- */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 2000;
      align-items: center; justify-content: center; padding: 16px;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: var(--white); border-radius: var(--radius-lg);
      padding: 28px; width: 100%; max-width: 560px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,.18);
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 18px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .fields-grid { display: flex; flex-wrap: wrap; gap: 14px; }
    .field-half { width: 100%; }
    @media (min-width: 520px) { .field-half { width: calc(50% - 7px); } }

    /* ---- Confirm dialog ---- */
    .confirm-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 2100;
      align-items: center; justify-content: center; padding: 16px;
    }
    .confirm-overlay.active { display: flex; }
    .confirm-box {
      background: var(--white); border-radius: var(--radius-lg);
      padding: 24px 24px 20px; width: 100%; max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .confirm-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
    .confirm-box p { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }
    .confirm-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }

    /* ---- Lightbox ---- */
    .lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.92); z-index: 4000;
      align-items: center; justify-content: center; cursor: pointer;
    }
    .lightbox.active { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }

    /* ---- Loading ---- */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; display: inline-block; }
    .empty-state { padding: 28px; text-align: center; color: var(--text-secondary); font-size: 14px; }
  </style>
</head>
<body>

  <!-- AppBar -->
  <header class="appbar">
    <span class="material-icons-outlined" style="color:var(--seed);font-size:20px;">search</span>
    <span class="appbar-title">Ricerca soci – Mediterranea</span>
    <span class="appbar-user" id="appbarUser"></span>
    <a href="admin.html" class="appbar-action">
      <span class="material-icons-outlined">dashboard</span> Dashboard
    </a>
    <a href="index.html" class="appbar-action">
      <span class="material-icons-outlined">home</span> Home
    </a>
    <button class="appbar-action" id="signOutBtn" style="display:none;" onclick="handleSignOut()">
      <span class="material-icons-outlined">logout</span> Esci
    </button>
  </header>

  <!-- Auth gate -->
  <div id="authGate">
    <div class="auth-gate-box">
      <div class="material-icons-outlined">lock</div>
      <h2>Accesso richiesto</h2>
      <p>Effettua l'accesso dalla dashboard admin per usare la ricerca.</p>
      <a href="admin.html" class="btn-filled">
        <span class="material-icons-outlined">login</span> Vai al login
      </a>
    </div>
  </div>

  <!-- Page body (visible after auth) -->
  <div id="pageBody">

    <!-- Filter panel -->
    <div class="filter-card">
      <!-- Main search bar with tune toggle -->
      <div class="search-main">
        <input type="search" id="fGeneral"
               placeholder="Tessera, nome, cognome, nascita, residenza, comune, CAP, email, telefono o data"
               oninput="applyFilters()">
        <button class="tune-btn" id="tuneBtn" onclick="toggleAdvanced()" title="Mostra/nascondi filtri avanzati">
          <span class="material-icons-outlined">tune</span>
        </button>
      </div>

      <!-- Advanced filters (hidden by default) -->
      <div class="advanced-panel" id="advancedPanel">
        <!-- Row 1: Stato, Privacy, Date range -->
        <div class="filter-row">
          <div class="filter-field">
            <label>Stato</label>
            <select id="fStato" onchange="applyFilters()">
              <option value="">Tutti gli stati</option>
              <option value="pending">Pending</option>
              <option value="approved">Confermati</option>
              <option value="rejected">Rifiutati</option>
              <option value="deleted">Archiviati</option>
            </select>
          </div>
          <div class="filter-field">
            <label>Registrato dal</label>
            <input type="date" id="fDateFrom" onchange="applyFilters()">
          </div>
          <div class="filter-field">
            <label>Registrato al</label>
            <input type="date" id="fDateTo" onchange="applyFilters()">
          </div>
        </div>
        <!-- Row 2: Text filters -->
        <div class="filter-row">
          <div class="filter-field">
            <label>Nome</label>
            <input type="text" id="fNome" placeholder="Nome" oninput="applyFilters()">
          </div>
          <div class="filter-field">
            <label>Cognome</label>
            <input type="text" id="fCognome" placeholder="Cognome" oninput="applyFilters()">
          </div>
          <div class="filter-field">
            <label>Luogo nascita</label>
            <input type="text" id="fLuogo" placeholder="Luogo nascita" oninput="applyFilters()">
          </div>
          <div class="filter-field">
            <label>Data nascita</label>
            <input type="text" id="fDataNascita" placeholder="gg/mm/aaaa" oninput="applyFilters()">
          </div>
          <div class="filter-field">
            <label>Residenza</label>
            <input type="text" id="fResidenza" placeholder="Residenza" oninput="applyFilters()">
          </div>
          <div class="filter-field">
            <label>Comune</label>
            <input type="text" id="fComune" placeholder="Comune" oninput="applyFilters()">
          </div>
          <div class="filter-field">
            <label>CAP</label>
            <input type="text" id="fCap" placeholder="CAP" oninput="applyFilters()">
          </div>
          <div class="filter-field">
            <label>Email</label>
            <input type="text" id="fEmail" placeholder="Email" oninput="applyFilters()">
          </div>
          <div class="filter-field">
            <label>Telefono</label>
            <input type="text" id="fTelefono" placeholder="Telefono" oninput="applyFilters()">
          </div>
        </div>
        <div style="margin-top:8px;">
          <button class="btn-ghost" onclick="resetFilters()">
            <span class="material-icons-outlined">restart_alt</span> Pulisci filtri
          </button>
        </div>
      </div>

      <div class="filter-actions">
        <button class="btn-outlined" onclick="loadAllMembers()">
          <span class="material-icons-outlined">refresh</span> Ricarica
        </button>
        <button class="btn-filled" onclick="exportExcel()">
          <span class="material-icons-outlined">table_chart</span> Excel
        </button>
        <span class="result-count" id="resultCount"></span>
      </div>
    </div>

    <!-- Results table -->
    <div class="table-wrap" id="resultsTableWrap">
      <div class="empty-state">Caricamento…</div>
    </div>

  </div><!-- /pageBody -->

  <!-- ====== Edit member modal ====== -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-box">
      <div class="modal-title">Modifica socio</div>
      <input type="hidden" id="editMemberId">
      <div class="fields-grid">
        <div class="field-half form-group">
          <label for="editNome">Nome</label>
          <input type="text" id="editNome">
        </div>
        <div class="field-half form-group">
          <label for="editCognome">Cognome</label>
          <input type="text" id="editCognome">
        </div>
        <div class="field-half form-group">
          <label for="editLuogoNascita">Luogo di nascita</label>
          <input type="text" id="editLuogoNascita">
        </div>
        <div class="field-half form-group">
          <label for="editDataNascita">Data di nascita (gg/mm/aaaa)</label>
          <input type="text" id="editDataNascita" placeholder="__/__/____" maxlength="10" inputmode="numeric">
        </div>
        <div class="field-half form-group">
          <label for="editResidenza">Residenza</label>
          <input type="text" id="editResidenza">
        </div>
        <div class="field-half form-group">
          <label for="editComune">Comune</label>
          <input type="text" id="editComune">
        </div>
        <div class="field-half form-group">
          <label for="editCap">CAP</label>
          <input type="text" id="editCap" inputmode="numeric">
        </div>
        <div class="field-half form-group">
          <label for="editEmail">Email</label>
          <input type="email" id="editEmail">
        </div>
        <div class="field-half form-group">
          <label for="editTelefono">Telefono</label>
          <input type="tel" id="editTelefono">
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" onclick="closeEditModal()">Annulla</button>
        <button class="btn-filled" id="editSaveBtn" onclick="submitEditMember()">
          <span class="material-icons-outlined">save</span> Salva
        </button>
      </div>
    </div>
  </div>

  <!-- ====== Confirm dialog ====== -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <h3 id="confirmTitle">Conferma</h3>
      <p id="confirmText"></p>
      <div class="confirm-actions">
        <button class="btn-ghost" onclick="confirmResolve(false)">Annulla</button>
        <button class="btn-filled" id="confirmOkBtn" onclick="confirmResolve(true)">Conferma</button>
      </div>
    </div>
  </div>

  <!-- ====== Lightbox ====== -->
  <div class="lightbox" id="lightbox" onclick="this.classList.remove('active')">
    <img id="lightboxImg" src="" alt="Firma">
  </div>

  <!-- Snackbar -->
  <div class="snackbar" id="snackbar"></div>

  <!-- SheetJS for Excel export -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <!-- jsPDF + autoTable for PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="logo-data.js"></script>
  <script>
    console.log('[ricerca] scripts loaded. getAppSetting:', typeof getAppSetting);
    /* ===========================================================
       Session helpers (shared with admin.html via sessionStorage)
    =========================================================== */
    const SB_KEY   = 'sb_access_token';
    const SB_EMAIL = 'sb_user_email';

    function getToken() { return sessionStorage.getItem(SB_KEY); }
    function clearSession() {
      sessionStorage.removeItem(SB_KEY);
      sessionStorage.removeItem('sb_refresh_token');
      sessionStorage.removeItem(SB_EMAIL);
    }

    /* ===========================================================
       Snackbar
    =========================================================== */
    let _snackTimer = null;
    function showSnackbar(msg, isError) {
      const el = document.getElementById('snackbar');
      el.textContent = msg;
      el.className   = 'snackbar visible ' + (isError ? 'error' : 'success');
      clearTimeout(_snackTimer);
      _snackTimer = setTimeout(() => el.classList.remove('visible'), 4500);
    }

    /* ===========================================================
       Confirm dialog
    =========================================================== */
    let _confirmResolve = null;
    function showConfirm(title, text, okLabel) {
      document.getElementById('confirmTitle').textContent = title;
      document.getElementById('confirmText').textContent  = text;
      document.getElementById('confirmOkBtn').textContent = okLabel || 'Conferma';
      document.getElementById('confirmOverlay').classList.add('active');
      return new Promise(res => { _confirmResolve = res; });
    }
    function confirmResolve(val) {
      document.getElementById('confirmOverlay').classList.remove('active');
      if (_confirmResolve) { _confirmResolve(val); _confirmResolve = null; }
    }

    /* ===========================================================
       Lightbox
    =========================================================== */
    function openLightbox(url) {
      document.getElementById('lightboxImg').src = url;
      document.getElementById('lightbox').classList.add('active');
    }

    /* ===========================================================
       Data state
    =========================================================== */
    let _allMembers    = [];
    let _filtered      = [];
    let _sortKey       = 'created_at';
    let _sortAsc       = false;

    /* ===========================================================
       Load
    =========================================================== */
    async function loadAllMembers() {
      const wrap = document.getElementById('resultsTableWrap');
      wrap.innerHTML = '<div class="empty-state"><span class="spin" style="font-size:22px;color:var(--seed);" class="material-icons-outlined">sync</span> Caricamento…</div>';
      try {
        _allMembers = await fetchAllMembers(getToken());
        applyFilters();
      } catch (e) {
        showSnackbar(e.message || 'Errore caricamento.', true);
        wrap.innerHTML = '<div class="empty-state">Errore nel caricamento dei soci.</div>';
      }
    }

    /* ===========================================================
       Formatters
    =========================================================== */
    function fmtDate(isoStr) {
      if (!isoStr) return '–';
      const d = new Date(isoStr);
      if (isNaN(d)) return isoStr;
      return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
    }
    function fmtBirth(iso) {
      if (!iso) return '–';
      const p = iso.split('-');
      return p.length >= 3 ? `${p[2]}/${p[1]}/${p[0]}` : iso;
    }
    function birthToInput(iso) {
      if (!iso) return '';
      const p = iso.split('-');
      return p.length >= 3 ? `${p[2]}/${p[1]}/${p[0]}` : '';
    }
    function escHtml(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function fmtBirthLabel(m) {
      const place = m.luogo_nascita || '';
      const date  = fmtBirth(m.data_nascita);
      if (!place && date === '–') return '–';
      if (!place) return date;
      if (date === '–') return place;
      return `${place} · ${date}`;
    }
    function residenceLabel(m) {
      const parts = [m.residenza, m.comune].filter(Boolean);
      if (m.cap) parts.push(`(${m.cap})`);
      return parts.join(' · ') || '–';
    }

    /* ===========================================================
       Sorting
    =========================================================== */
    function sortBy(key) {
      if (_sortKey === key) { _sortAsc = !_sortAsc; }
      else { _sortKey = key; _sortAsc = true; }
      renderTable(_filtered);
    }

    function sortIcon(key) {
      if (_sortKey !== key) return '';
      return `<span class="sort-icon material-icons-outlined">${_sortAsc ? 'arrow_upward' : 'arrow_downward'}</span>`;
    }

    function sortRows(rows) {
      const key = _sortKey;
      return [...rows].sort((a, b) => {
        let va = a[key] ?? '';
        let vb = b[key] ?? '';
        if (key === 'numero_tessera') {
          va = parseInt(va, 10) || 0;
          vb = parseInt(vb, 10) || 0;
          return _sortAsc ? va - vb : vb - va;
        }
        va = String(va).toLowerCase();
        vb = String(vb).toLowerCase();
        if (va < vb) return _sortAsc ? -1 : 1;
        if (va > vb) return _sortAsc ? 1 : -1;
        return 0;
      });
    }

    /* ===========================================================
       Filters
    =========================================================== */
    function applyFilters() {
      const qGen       = document.getElementById('fGeneral').value.trim().toLowerCase();
      const qNome      = document.getElementById('fNome').value.trim().toLowerCase();
      const qCognome   = document.getElementById('fCognome').value.trim().toLowerCase();
      const qLuogo     = document.getElementById('fLuogo').value.trim().toLowerCase();
      const qDNasc     = document.getElementById('fDataNascita').value.trim().toLowerCase();
      const qResidenza = document.getElementById('fResidenza').value.trim().toLowerCase();
      const qComune    = document.getElementById('fComune').value.trim().toLowerCase();
      const qCap       = document.getElementById('fCap').value.trim().toLowerCase();
      const qEmail     = document.getElementById('fEmail').value.trim().toLowerCase();
      const qTel       = document.getElementById('fTelefono').value.trim().toLowerCase();
      const qStato     = document.getElementById('fStato').value;
      const qFrom      = document.getElementById('fDateFrom').value;   // yyyy-MM-dd
      const qTo        = document.getElementById('fDateTo').value;

      _filtered = _allMembers.filter(m => {
        if (qStato && m.stato !== qStato) return false;
        if (qNome    && !String(m.nome    ?? '').toLowerCase().includes(qNome))    return false;
        if (qCognome && !String(m.cognome ?? '').toLowerCase().includes(qCognome)) return false;
        if (qLuogo   && !String(m.luogo_nascita ?? '').toLowerCase().includes(qLuogo)) return false;
        if (qResidenza && !String(m.residenza ?? '').toLowerCase().includes(qResidenza)) return false;
        if (qComune  && !String(m.comune ?? '').toLowerCase().includes(qComune)) return false;
        if (qCap     && !String(m.cap ?? '').toLowerCase().includes(qCap)) return false;
        if (qEmail   && !String(m.email ?? '').toLowerCase().includes(qEmail)) return false;
        if (qTel     && !String(m.telefono ?? '').toLowerCase().includes(qTel)) return false;
        if (qDNasc   && !fmtBirth(m.data_nascita).toLowerCase().includes(qDNasc)) return false;
        if (qFrom && m.created_at && m.created_at.slice(0,10) < qFrom) return false;
        if (qTo   && m.created_at && m.created_at.slice(0,10) > qTo)   return false;
        if (qGen) {
          const all = [
            m.numero_tessera, m.nome, m.cognome, m.luogo_nascita, fmtBirth(m.data_nascita),
            m.residenza, m.comune, m.cap, m.email, m.telefono, m.stato, fmtDate(m.created_at),
          ].join(' ').toLowerCase();
          if (!all.includes(qGen)) return false;
        }
        return true;
      });

      renderTable(_filtered);
      document.getElementById('resultCount').textContent = `${_filtered.length} risultati`;
    }

    function toggleAdvanced() {
      const panel = document.getElementById('advancedPanel');
      const btn = document.getElementById('tuneBtn');
      panel.classList.toggle('show');
      btn.classList.toggle('active');
    }

    function resetFilters() {
      ['fGeneral','fNome','fCognome','fLuogo','fDataNascita','fResidenza',
       'fComune','fCap','fEmail','fTelefono','fDateFrom','fDateTo'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('fStato').value = '';
      applyFilters();
    }

    /* ===========================================================
       Render table
    =========================================================== */
    const _memberCache = {};
    function cacheMember(m) { _memberCache[m.id] = m; }
    function getCached(id) { return _memberCache[id]; }

    function renderTable(rows) {
      const wrap = document.getElementById('resultsTableWrap');
      if (!rows.length) {
        wrap.innerHTML = '<div class="empty-state">Nessun risultato trovato.</div>';
        return;
      }
      const sorted = sortRows(rows);
      wrap.innerHTML = `
        <table>
          <thead><tr>
            <th onclick="sortBy('numero_tessera')">Tessera ${sortIcon('numero_tessera')}</th>
            <th onclick="sortBy('cognome')">Nome ${sortIcon('cognome')}</th>
            <th onclick="sortBy('data_nascita')">Nascita ${sortIcon('data_nascita')}</th>
            <th onclick="sortBy('comune')">Residenza ${sortIcon('comune')}</th>
            <th onclick="sortBy('email')">Email ${sortIcon('email')}</th>
            <th>Telefono</th>
            <th onclick="sortBy('stato')">Stato ${sortIcon('stato')}</th>
            <th onclick="sortBy('created_at')">Data ${sortIcon('created_at')}</th>
            <th>Azioni</th>
          </tr></thead>
          <tbody id="resultsTbody"></tbody>
        </table>`;
      const tbody = document.getElementById('resultsTbody');
      sorted.forEach(m => {
        cacheMember(m);
        const tr = document.createElement('tr');
        const statusColor = {approved:'#4CAF50',deleted:'#F44336',rejected:'#212121',pending:'#607D8B'}[m.stato] ?? '#607D8B';
        const normalizedStatus = (m.stato || '').trim().toLowerCase();
        const isApproved = normalizedStatus === 'approved';
        const isDeleted  = normalizedStatus === 'deleted';
        const isPending  = normalizedStatus === 'pending';

        // Build actions matching Flutter: approved→edit+pdf+archive, pending→pdf+archive+approve+reject, deleted→pdf only
        let actionsHtml = '';
        if (isApproved) {
          actionsHtml = `
            <button class="action-btn" title="Modifica" onclick="openEditModal(getCached('${escHtml(m.id)}'))">
              <span class="material-icons-outlined">edit</span>
            </button>
            <button class="action-btn" title="Genera PDF" onclick="exportMemberPdf(getCached('${escHtml(m.id)}'))">
              <span class="material-icons-outlined">picture_as_pdf</span>
            </button>
            <button class="action-btn danger" title="Archivia" onclick="handleDeleteMember('${escHtml(m.id)}','${escHtml(m.nome+' '+m.cognome)}')">
              <span class="material-icons-outlined">delete</span>
            </button>`;
        } else if (isPending) {
          actionsHtml = `
            <button class="action-btn" title="Genera PDF" onclick="exportMemberPdf(getCached('${escHtml(m.id)}'))">
              <span class="material-icons-outlined">picture_as_pdf</span>
            </button>
            <button class="action-btn danger" title="Archivia" onclick="handleDeleteMember('${escHtml(m.id)}','${escHtml(m.nome+' '+m.cognome)}')">
              <span class="material-icons-outlined">delete</span>
            </button>
            <button class="action-btn" title="Approva" onclick="handleApproveMember('${escHtml(m.id)}','${escHtml(m.nome+' '+m.cognome)}')">
              <span class="material-icons-outlined">check_circle</span>
            </button>
            <button class="action-btn danger" title="Rifiuta" onclick="handleRejectMember('${escHtml(m.id)}','${escHtml(m.nome+' '+m.cognome)}')">
              <span class="material-icons-outlined">close</span>
            </button>`;
        } else {
          // deleted or rejected → only PDF
          actionsHtml = `
            <button class="action-btn" title="Genera PDF" onclick="exportMemberPdf(getCached('${escHtml(m.id)}'))">
              <span class="material-icons-outlined">picture_as_pdf</span>
            </button>`;
        }

        tr.innerHTML = `
          <td><strong>${escHtml(m.numero_tessera||'–')}</strong></td>
          <td title="${escHtml(m.nome+' '+m.cognome)}">${escHtml(m.nome)} ${escHtml(m.cognome)}</td>
          <td>${escHtml(fmtBirthLabel(m))}</td>
          <td title="${escHtml(residenceLabel(m))}">${escHtml(residenceLabel(m))}</td>
          <td title="${escHtml(m.email)}">${escHtml(m.email)}</td>
          <td>${escHtml(m.telefono)}</td>
          <td><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${statusColor};" title="${escHtml(m.stato)}"></span></td>
          <td>${fmtDate(m.created_at)}</td>
          <td style="white-space:nowrap;">${actionsHtml}</td>`;
        tbody.appendChild(tr);
      });
    }

    /* ===========================================================
       Actions
    =========================================================== */
    async function handleDeleteMember(memberId, fullName) {
      const ok = await showConfirm('Archivia socio', `Archiviare ${fullName}?`, 'Archivia');
      if (!ok) return;
      try {
        await deleteMemberSoft(memberId, getToken());
        showSnackbar('Socio archiviato.');
        await loadAllMembers();
      } catch (e) {
        showSnackbar(e.message || 'Archiviazione fallita.', true);
      }
    }

    async function handleApproveMember(memberId, fullName) {
      const ok = await showConfirm('Approva socio', `Approvare ${fullName}? Verrà assegnato il prossimo numero tessera disponibile.`, 'Approva');
      if (!ok) return;
      try {
        const num = await approveMember(memberId, getToken());
        showSnackbar(`Tessera n° ${num} assegnata a ${fullName}. ✓`);
        await loadAllMembers();
      } catch (e) {
        showSnackbar(e.message || 'Approvazione fallita.', true);
      }
    }

    async function handleRejectMember(memberId, fullName) {
      const ok = await showConfirm('Rifiuta richiesta', `Rifiutare la richiesta di ${fullName}?`, 'Rifiuta');
      if (!ok) return;
      try {
        await updateMember(memberId, { stato: 'rejected' }, getToken());
        showSnackbar('Richiesta rifiutata.');
        await loadAllMembers();
      } catch (e) {
        showSnackbar(e.message || 'Rifiuto fallito.', true);
      }
    }

    /* ===========================================================
       Edit member modal
    =========================================================== */
    function openEditModal(member) {
      document.getElementById('editMemberId').value     = member.id ?? '';
      document.getElementById('editNome').value         = member.nome ?? '';
      document.getElementById('editCognome').value      = member.cognome ?? '';
      document.getElementById('editLuogoNascita').value = member.luogo_nascita ?? '';
      document.getElementById('editDataNascita').value  = birthToInput(member.data_nascita);
      document.getElementById('editResidenza').value    = member.residenza ?? '';
      document.getElementById('editComune').value       = member.comune ?? '';
      document.getElementById('editCap').value          = member.cap ?? '';
      document.getElementById('editEmail').value        = member.email ?? '';
      document.getElementById('editTelefono').value     = member.telefono ?? '';
      document.getElementById('editModal').classList.add('active');
    }
    function closeEditModal() {
      document.getElementById('editModal').classList.remove('active');
    }

    async function submitEditMember() {
      const memberId = document.getElementById('editMemberId').value;
      const dataNascitaRaw = document.getElementById('editDataNascita').value.trim();
      const dataNascitaIso = dataNascitaRaw ? dateToIso(dataNascitaRaw) : null;
      if (dataNascitaRaw && !dataNascitaIso) {
        showSnackbar('Formato data non valido (gg/mm/aaaa).', true); return;
      }
      const fields = {
        nome:          document.getElementById('editNome').value.trim(),
        cognome:       document.getElementById('editCognome').value.trim(),
        luogo_nascita: document.getElementById('editLuogoNascita').value.trim(),
        residenza:     document.getElementById('editResidenza').value.trim(),
        comune:        document.getElementById('editComune').value.trim(),
        cap:           document.getElementById('editCap').value.trim(),
        email:         document.getElementById('editEmail').value.trim().toLowerCase(),
        telefono:      document.getElementById('editTelefono').value.trim(),
      };
      if (dataNascitaIso) fields.data_nascita = dataNascitaIso;
      const btn = document.getElementById('editSaveBtn');
      btn.disabled = true;
      try {
        await updateMember(memberId, fields, getToken());
        closeEditModal();
        showSnackbar('Socio aggiornato.');
        await loadAllMembers();
      } catch (e) {
        showSnackbar(e.message || 'Aggiornamento fallito.', true);
      } finally { btn.disabled = false; }
    }

    document.getElementById('editDataNascita').addEventListener('input', function() {
      let digits = this.value.replace(/\D/g, '').slice(0, 8);
      let formatted = '';
      for (let i = 0; i < digits.length; i++) {
        formatted += digits[i];
        if ((i === 1 || i === 3) && i !== digits.length - 1) formatted += '/';
      }
      this.value = formatted;
    });

    /* ===========================================================
       Export Excel
    =========================================================== */
    function buildExportRows(rows) {
      return rows.map(m => ({
        'N° Tessera':    m.numero_tessera || '',
        'Nome':          m.nome || '',
        'Cognome':       m.cognome || '',
        'Luogo nascita': m.luogo_nascita || '',
        'Data nascita':  fmtBirth(m.data_nascita),
        'Residenza':     m.residenza || '',
        'Comune':        m.comune || '',
        'CAP':           m.cap || '',
        'Email':         m.email || '',
        'Telefono':      m.telefono || '',
        'Stato':         m.stato || '',
        'Privacy':       m.privacy_accepted ? 'Sì' : 'No',
        'Data reg.':     fmtDate(m.created_at),
        'Firma URL':     m.firma_url || '',
      }));
    }

    function exportExcel() {
      if (!_filtered.length) { showSnackbar('Nessun risultato da esportare.', true); return; }
      try {
        const data = buildExportRows(_filtered);
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Soci');
        XLSX.writeFile(wb, `soci_${new Date().toISOString().slice(0,10)}.xlsx`);
        showSnackbar(`${_filtered.length} soci esportati in Excel.`);
      } catch (e) {
        showSnackbar('Errore generazione Excel: ' + e.message, true);
      }
    }

    /* ===========================================================
       Export PDF (elenco tabellare per tutti i risultati)
    =========================================================== */
    function exportPdf() {
      if (!_filtered.length) { showSnackbar('Nessun risultato da esportare.', true); return; }
      try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
        doc.setFontSize(14);
        doc.text('Elenco soci – JATA APS', 14, 14);
        doc.setFontSize(9);
        doc.text(`Esportato il ${new Date().toLocaleDateString('it-IT')} – ${_filtered.length} risultati`, 14, 20);

        const head = [['Tessera','Nome','Cognome','Nascita','Comune','Email','Telefono','Stato','Data']];
        const body = _filtered.map(m => [
          m.numero_tessera || '–',
          m.nome || '',
          m.cognome || '',
          fmtBirth(m.data_nascita),
          m.comune || '',
          m.email || '',
          m.telefono || '',
          m.stato || '',
          fmtDate(m.created_at),
        ]);

        doc.autoTable({
          head, body,
          startY: 24,
          styles: { fontSize: 8, cellPadding: 2 },
          headStyles: { fillColor: [46, 125, 50], textColor: 255, fontStyle: 'bold' },
          alternateRowStyles: { fillColor: [244, 246, 243] },
          margin: { left: 10, right: 10 },
        });

        doc.save(`soci_${new Date().toISOString().slice(0,10)}.pdf`);
        showSnackbar(`${_filtered.length} soci esportati in PDF.`);
      } catch (e) {
        showSnackbar('Errore generazione PDF: ' + e.message, true);
      }
    }

    /* ===========================================================
       PDF singolo socio (identico all'app Flutter)
    =========================================================== */
    async function exportMemberPdf(member) {
      try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'portrait', unit: 'pt', format: 'a4' });
        const W = doc.internal.pageSize.getWidth();
        const H = doc.internal.pageSize.getHeight();
        const marginL = 22, marginT = 18, marginR = 22, marginB = 20;
        const usable = W - marginL - marginR;
        let y = marginT;

        // Logo embedded as base64 (loaded from logo-data.js)
        const logoImg = (typeof LOGO_BASE64 !== 'undefined') ? LOGO_BASE64 : null;

        // Header row: logo + text column
        const logoW = 92;
        const logoH = Math.round(logoW * 199 / 393); // maintain aspect ratio (393x199 px)
        const logoGap = 14;
        const headerTextX = logoImg ? marginL + logoW + logoGap : marginL;
        if (logoImg) {
          doc.addImage(logoImg, 'PNG', marginL, y, logoW, logoH);
        }

        doc.setFontSize(16);
        doc.setFont(undefined, 'bold');
        doc.text('JATA APS', headerTextX, y + 14);
        doc.setFontSize(9);
        doc.setFont(undefined, 'normal');
        doc.text('Via Giacomo Leopardi 1/C - 73020 Cutrofiano (LE)', headerTextX, y + 14 + 3 + 11);
        doc.text('P.IVA / Cod. Fisc. 05190010750', headerTextX, y + 14 + 3 + 11 + 11);

        doc.setFontSize(18);
        doc.setFont(undefined, 'bold');
        doc.text('Modulo di adesione socio', headerTextX, y + 14 + 3 + 11 + 11 + 10 + 20);
        doc.setFontSize(9);
        doc.setFont(undefined, 'normal');
        const generatedAt = new Date().toLocaleDateString('it-IT', { day:'2-digit', month:'2-digit', year:'numeric' });
        doc.text('Documento generato il ' + generatedAt, headerTextX, y + 14 + 3 + 11 + 11 + 10 + 20 + 4 + 11);

        y += Math.max(logoH, 94) + 12;

        // Info cards in Wrap layout
        const registrationDate = member.created_at
          ? new Date(member.created_at).toLocaleDateString('it-IT', { day:'2-digit', month:'2-digit', year:'numeric' })
          : '-';
        const details = [
          ['Numero tessera', member.numero_tessera || '-'],
          ['Data registrazione', registrationDate],
          ['Nome', member.nome || '-'],
          ['Cognome', member.cognome || '-'],
          ['Luogo di nascita', member.luogo_nascita || '-'],
          ['Data di nascita', fmtBirth(member.data_nascita)],
          ['Residenza', member.residenza || '-'],
          ['Comune', member.comune || '-'],
          ['CAP', member.cap || '-'],
          ['Telefono', member.telefono || '-'],
          ['Email', member.email || '-'],
        ];

        const cardW = 255, cardSpacing = 10, cardRunSpacing = 8;
        const cardPadH = 8, cardPadV = 6, cardRadius = 6;
        const labelFs = 9, valueFs = 9;
        const cardH = cardPadV + labelFs + 2 + valueFs + cardPadV;

        let cx = marginL, cy = y;
        details.forEach(pair => {
          if (cx + cardW > W - marginR + 1) {
            cx = marginL;
            cy += cardH + cardRunSpacing;
          }
          doc.setFillColor(240, 240, 240);
          doc.roundedRect(cx, cy, cardW, cardH, cardRadius, cardRadius, 'F');
          doc.setFontSize(labelFs);
          doc.setFont(undefined, 'bold');
          doc.setTextColor(0);
          doc.text(pair[0], cx + cardPadH, cy + cardPadV + labelFs * 0.75);
          doc.setFont(undefined, 'normal');
          doc.setFontSize(valueFs);
          doc.text(pair[1] || '-', cx + cardPadH, cy + cardPadV + labelFs + 2 + valueFs * 0.75);
          cx += cardW + cardSpacing;
        });

        y = cy + cardH + 14;

        // Signature row
        const sigBoxW = 150, sigBoxH = 62;
        const sigBoxX = W - marginR - sigBoxW;
        const sigBoxY = y;

        doc.setFontSize(11);
        doc.setFont(undefined, 'bold');
        doc.setTextColor(0);
        doc.text('Firma del socio', marginL, y + sigBoxH - 4);

        doc.setDrawColor(158, 158, 158);
        doc.roundedRect(sigBoxX, sigBoxY, sigBoxW, sigBoxH, 8, 8);

        if (member.firma_url) {
          try {
            const sigRes = await fetch(member.firma_url);
            if (sigRes.ok) {
              const sigBlob = await sigRes.blob();
              const sigData = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.readAsDataURL(sigBlob);
              });
              doc.addImage(sigData, 'PNG', sigBoxX + 6, sigBoxY + 6, sigBoxW - 12, sigBoxH - 12);
            }
          } catch (_) {
            doc.setFontSize(8);
            doc.setTextColor(112);
            doc.text('Firma non disponibile', sigBoxX + sigBoxW / 2, sigBoxY + sigBoxH / 2, { align: 'center' });
          }
        } else {
          doc.setFontSize(8);
          doc.setTextColor(112);
          doc.text('Firma non disponibile', sigBoxX + sigBoxW / 2, sigBoxY + sigBoxH / 2, { align: 'center' });
        }

        // Privacy footer
        const footerY = H - marginB;
        doc.setDrawColor(189, 189, 189);
        doc.line(marginL, footerY - 18, W - marginR, footerY - 18);
        doc.setFontSize(8);
        doc.setTextColor(112);
        doc.setFont(undefined, 'normal');
        doc.text(
          'Acconsento al trattamento dei miei dati personali ai sensi del REg. UE 679/2016 (GDPR), esclusivamente per finalità associative e di comunicazione interna.',
          W / 2, footerY - 4,
          { align: 'center', maxWidth: usable }
        );

        // Save
        const safeName = (member.cognome || '') + '_' + (member.nome || '');
        const cleanName = safeName.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
        const timestamp = new Date().toISOString().slice(0, 16).replace(/[-:T]/g, '').slice(0, 12);
        doc.save('modulo_' + (cleanName || 'socio') + '_' + timestamp + '.pdf');
        showSnackbar('PDF generato.');
      } catch (e) {
        showSnackbar('Errore generazione PDF: ' + e.message, true);
      }
    }

    /* ===========================================================
       Sign out
    =========================================================== */
    async function handleSignOut() {
      const token = getToken();
      if (token) await signOutAdmin(token).catch(() => {});
      clearSession();
      window.location.href = 'admin.html';
    }

    /* ===========================================================
       Init
    =========================================================== */
    (async function init() {
      console.log('[ricerca] init() START');
      try {
        const colorHex = await getAppSetting(SETTING_THEME_COLOR);
        console.log('[ricerca] colorHex:', colorHex);
        applySeedColor(colorHex);
      } catch (err) {
        console.error('[ricerca] init color error:', err);
      }
      console.log('[ricerca] adding body.ready');
      document.body.classList.add('ready');

      const token = getToken();
      console.log('[ricerca] token present:', !!token);
      if (!token) {
        console.log('[ricerca] no token — showing auth gate');
        console.log('[ricerca] authGate offsetHeight:', document.getElementById('authGate').offsetHeight);
        return;
      }

      document.getElementById('authGate').style.display = 'none';
      document.getElementById('pageBody').style.display  = 'block';
      document.getElementById('signOutBtn').style.display = 'inline-flex';
      const email = sessionStorage.getItem(SB_EMAIL);
      if (email) document.getElementById('appbarUser').textContent = email;

      console.log('[ricerca] loading all members...');
      await loadAllMembers();
      console.log('[ricerca] init() DONE');
    })();
  </script>
</body>
</html>
